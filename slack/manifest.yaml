display_information:
  name: Hablá con tu Slack
  description: Preguntale a tu Slack — agente de IA serverless en AWS (AgentCore)
features:
  bot_user:
    display_name: slack-rag
    always_online: true
  slash_commands:
    - command: /ask
      description: Preguntale a tu Slack
      usage_hint: "¿qué se decidió sobre el deploy?"
      # Request URL: se completa tras desplegar el API Gateway (Task 11)
    - command: /ingest
      description: Indexar la historia del canal actual
      usage_hint: ""
oauth_config:
  scopes:
    bot:
      - commands
      - channels:history
      - channels:read
      - groups:history
      - users:read
      - chat:write
settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
